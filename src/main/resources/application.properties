####################################################
# Application
####################################################

spring.application.name=ai-chat-assistant

spring.profiles.include=mcp

####################################################
# AI Model
####################################################

spring.ai.model.chat=google-genai
spring.ai.model.embedding=ollama

####################################################
# Gemini
####################################################

spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.project-id=your-gcp-project-id
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

####################################################
# Ollama Embedding
####################################################

spring.ai.ollama.embedding.options.model=nomic-embed-text

####################################################
# Conversation
####################################################

conversation.summary.threshold=4
conversation.summary.keep-recent-messages=2
conversation.ttl=30m

####################################################
# Vector Store
####################################################

spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.schema-name=public

####################################################
# RAG
####################################################

rag.documents-location=classpath:/docs/*.pdf
rag.chunk-size=800
rag.min-chunk-size-chars=350
rag.min-chunk-length-to-embed=5
rag.max-num-chunks=10000
rag.keep-separator=true
rag.top-k=5
rag.similarity-threshold=0.75

####################################################
# JPA
####################################################

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

####################################################
# Security
####################################################

security.jwt.secret=ThisIsMyVerySecretKeyForEnterpriseAIAssistant2026
security.jwt.expiration=3600000

####################################################
# Observability
####################################################

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=enterprise-ai-assistant

####################################################
# Logging
####################################################

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG
logging.level.io.modelcontextprotocol=DEBUG